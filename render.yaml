# ==========================================================
#  RENDER BLUEPRINT (backend uchun)
#  Render.com "Blueprint" orqali shu faylni o'qib, servisni
#  avtomatik sozlaydi. Maxfiy qiymatlarni (sync: false) Render
#  panelida qo'lda kiritasiz.
# ==========================================================

services:
  - type: web
    name: ignite-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT'ni Render avtomatik beradi - tegmaymiz
      - key: DATABASE_URL
        sync: false # Neon connection string (qo'lda kiritiladi)
      - key: JWT_SECRET
        generateValue: true # Render tasodifiy qiymat yaratadi
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false # Vercel admin manzili (deploydan keyin kiritiladi)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: ignite-blog
      - key: ADMIN_NAME
        value: Super Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
